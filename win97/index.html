<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" type="text/css" href="/css/great-scott.css"/>
<meta name="viewport" content="width=device-width, user-scalable=yes"/>
<title>Windows 97 - waluigi-servebeer.com</title>
<style>
footer {
	display:none;
}
body {
	padding-top:0px;
  margin: 0;
  overflow: hidden;
  background-color: #008080;
  /*font-family: Arial, sans-serif;*/
  height: 100vh;
}
</style>
</head>
<body>
<div id="virtual-desktop-real">
<div id="win97-store">
	<style>
		div#win97-store {
			user-select: none;
		}
		div#win97-store {
			.window:not(.active) .title-bar {
				background: #808080;
			}

			.taskbar {
				position: fixed;
				bottom: 0;
				left: 0;
				width: 100%;
				height: 30px;
				display: flex;
				align-items: center;
				padding: 2px 4px;
				background: #c0c0c0;
				border-top: 2px solid #dfdfdf;
				box-shadow: inset 0 1px 0 #fff;
				box-sizing: border-box;
				z-index: 99999;
			}

			.taskbar-tasks {
				display: flex;
				gap: 4px;
				flex-grow: 1;
			}

				.taskbar-tasks button.active {
					box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
					background: #e4e4e4;
				}

			div.window {
				position: absolute;
				z-index: 1;
			}
			div.window-body {
				padding: 2px;
			}
		}		
	</style>
	<div id="user-desktop" class="retro-os win97">
		<div class="taskbar">
			<button id="start-btn" style="font-weight: bold; margin-right: 10px; padding: 2px 6px;">Start</button>
			<div class="taskbar-tasks" id="taskbar-tasks">
				</div>
		</div>
	</div>
</div>
</div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/dwm.ts"></script>
	<script src="/js/everything.js"></script>
	<script>
function pleaseInitializeMeCapn() {
	var windog = window;
	if (typeof windog.dwm_init === 'function') {
		windog.dwm_init();
	} else {
		requestAnimationFrame(pleaseInitializeMeCapn);
	}
}
		pleaseInitializeMeCapn();
	</script>
</body>
</html>
