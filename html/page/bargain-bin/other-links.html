<script>
async function reality() {
	// get the resources
	const res = await fetch('/page/bargain-bin/linktargets.html');
	const rtext = await res.text();
	const webrings = document.getElementById('webrings');
	const parser = new DOMParser();
	var contract = parser.parseFromString(rtext, 'text/html');

	// actually append them to the page
	Array.from(contract.body.children).forEach(A => {
		const icon_perchance = A.getAttribute('ICON');
		A.insertAdjacentHTML('afterbegin', `<img src="${icon_perchance??''}"/>`);
		A.removeAttribute('ICON');
		A.setAttribute('target', '_blank');
		A.setAttribute('rel', 'noopener');
		A.classList.add('bortcut');
		const lizard = document.createElement('li');		
		lizard.appendChild(A);
		webrings.appendChild(lizard);
	});
}
reality();

// thanks, gemini
function encodeToHtmlSafe(str) {
	return Array.from(str).map(char => {
		const code = char.codePointAt(0);
		return code > 127 ? `&#${code};` : char;
	}).join('');
}

</script>
