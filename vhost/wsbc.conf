# HTTP redirect
<VirtualHost *:80>
# development
<IfModule !mod_ssl.c>
  ServerName localhost
  Include "/httpd/waluigi_servebeer/vhost/wsbc_main.conf"
</IfModule>
# deployment  
<IfModule mod_ssl.c>
  ServerName waluigi-servebeer.com
  RewriteEngine on
  RewriteCond %{SERVER_NAME} =waluigi-servebeer.com
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</IfModule>
</VirtualHost>

# HTTPS config
<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName waluigi-servebeer.com
  
  Include "/httpd/waluigi_servebeer/vhost/wsbc_main.conf"

  # LetsEncrypt
  SSLCertificateFile /etc/letsencrypt/live/waluigi-servebeer.com/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/waluigi-servebeer.com/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>

# IP responses
<VirtualHost *:80>
  ServerName 4.waluigi-servebeer.com
  ServerAlias 6.waluigi-servebeer.com
  ProxyPass "/" "http://localhost:39600/ip"
  ProxyPassReverse "/" "http://localhost:39600/ip"
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName 4.waluigi-servebeer.com
  ServerAlias 6.waluigi-servebeer.com
  
  ProxyPass "/punch" "http://localhost:39600/punch"
  ProxyPassReverse "/punch" "http://localhost:39600/punch"
  ProxyPass "/account" "http://localhost:39600"
  ProxyPassReverse "/account" "http://localhost:39600"
  ProxyPass "/api" "http://localhost:39600/api"
  ProxyPassReverse "/api" "http://localhost:39600/api"
  ProxyPass "/wss" "ws://localhost:39600/wss"
  ProxyPassReverse "/wss" "ws://localhost:39600/wss"
  ProxyPass "/" "http://localhost:39600/ip"
  ProxyPassReverse "/" "http://localhost:39600/ip"
  
  SSLCertificateFile /etc/letsencrypt/live/4.waluigi-servebeer.com/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/4.waluigi-servebeer.com/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
