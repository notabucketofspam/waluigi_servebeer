<VirtualHost *:80>
  ServerName livekit.waluigi-servebeer.com
  RewriteEngine on
  RewriteCond %{SERVER_NAME} =livekit.waluigi-servebeer.com
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName livekit.waluigi-servebeer.com

  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} =websocket [NC]
  RewriteRule /(.*) ws://localhost:7880/$1 [P,L]

  <Location "/">
    ProxyPass "http://localhost:7880/"
    ProxyPassReverse "http://localhost:7880/"
  </Location>

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/livekit.waluigi-servebeer.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/livekit.waluigi-servebeer.com/privkey.pem
</VirtualHost>
</IfModule>
