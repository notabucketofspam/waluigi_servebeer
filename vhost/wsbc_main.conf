DocumentRoot "/httpd/waluigi_servebeer/html"
Header add Cache-Control max-age=3939

<Directory "/httpd/waluigi_servebeer">
  AllowOverride None
  Require all granted
</Directory>
<Directory "/httpd/waluigi_servebeer/html">
  AllowOverride None
  Options Indexes FollowSymLinks
  Require all granted
</Directory>
<Directory "/httpd/waluigi_servebeer/cgi-bin">
  AllowOverride None
  Options None
  Require all granted
</Directory>
ScriptAlias /cgi-bin/ "/httpd/waluigi_servebeer/cgi-bin/"

# ClockBot
<Location "/cmd">
  ProxyPass "http://localhost:39692/cmd"
  ProxyPassReverse "http://localhost:39692/cmd"
</Location>
<Directory "/httpd/waluigi_servebeer/html/page/soundboard/opodes">
  Header set Cache-Control max-age=86400
  <Files "boards.js">
    Header set Cache-Control max-age=600
  </Files>
</Directory>

# online
<Location "/account">
  ProxyPass "http://localhost:39600"
  ProxyPassReverse "http://localhost:39600"
</Location>
<Location "/api">
  ProxyPass "http://localhost:39600/api"
  ProxyPassReverse "http://localhost:39600/api"
</Location>
ProxyPass "/product-key" "http://localhost:39600/product-key"
ProxyPassReverse "/product-key" "http://localhost:39600/product-key"

# punch  
ProxyPass "/punch" "http://localhost:39600/punch"
ProxyPassReverse "/punch" "http://localhost:39600/punch"
ProxyPass "/ip" "http://localhost:39600/ip"
ProxyPassReverse "/ip" "http://localhost:39600/ip"
ProxyPass "/wss" "ws://localhost:39600/wss"
ProxyPassReverse "/wss" "ws://localhost:39600/wss"

Alias "/dlc" "/httpd/dlc"
<Directory "/httpd/dlc">
  AllowOverride none
  Options indexes
  Require all granted
  FileETag Digest
</Directory>

# voice chat
<Location "/livekit">
  ProxyPass "http://localhost:39600/livekit"
  ProxyPassReverse "http://localhost:39600/livekit"
</Location>
Alias /chat /httpd/chat
<Directory /httpd/chat>
  AllowOverride none
  Require all granted
  FallbackResource /httpd/chat/index.html
</Directory>

# Shinonome-posting
AliasMatch "^/.well-known" "/httpd/waluigi_servebeer/html/resource/wkbs.jpg"
